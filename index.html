<!DOCTYPE html>
<html lang="bg" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A2A6B" />
  <meta name="google" content="notranslate" />
  <title>SwimWithSmile</title>

  <!-- PWA: инсталиране на началния екран, за да изчезне интерфейсът на браузъра -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SwimWithSmile" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css?v=28" />
</head>
<body class="notranslate">
  <div id="app" class="app-root">
    <!-- Съдържанието се рендира от JavaScript -->
  </div>

  <div id="toast-host" class="toast-host" aria-live="polite"></div>
  <div id="modal-host" class="modal-host" hidden></div>

  <script src="js/api.js?v=28"></script>
  <script src="js/app.js?v=28"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
